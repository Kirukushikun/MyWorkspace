body[data-theme='dark']{

}
html,body,#root{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);font-size:14px;background:var(--bg3);transition:background 0.2s,color 0.2s}
input,select,textarea{background:var(--bg);color:var(--text);border:0.5px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:inherit;width:100%;outline:none;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:#378add;box-shadow:0 0 0 3px rgba(55,138,221,0.1)}
input[type="file"]{padding:6px 10px;font-size:12px}
input[type="checkbox"]{width:auto;cursor:pointer}
button{background:transparent;border:0.5px solid var(--border2);border-radius:var(--r);padding:6px 14px;font-size:12px;font-family:inherit;color:var(--text);cursor:pointer;transition:background 0.12s}
button:hover{background:var(--bg2)}
textarea{resize:vertical;line-height:1.6}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:4px}

// ─── UI HELPERS ──────────────────────────────────────────────
function Badge({status}){
  const M={
    submitted:{bg:'var(--blue-bg)',c:'var(--blue)',l:'Submitted'},
    recommended:{bg:'var(--blue-bg)',c:'var(--blue)',l:'Recommended'},
    vp_approved:{bg:'var(--blue-bg)',c:'var(--blue)',l:'VP Approved'},
    noted:{bg:'var(--blue-bg)',c:'var(--blue)',l:'Noted'},
    accepted:{bg:'var(--green-bg)',c:'var(--green)',l:'Accepted'},
    late_pending:{bg:'var(--amber-bg)',c:'var(--amber)',l:'Late – Pending'},
    rejected:{bg:'var(--red-bg)',c:'var(--red)',l:'Rejected'},
    active:{bg:'var(--green-bg)',c:'var(--green)',l:'Active'},
    inactive:{bg:'var(--gray-bg)',c:'var(--gray)',l:'Inactive'},
    pending_vp:{bg:'var(--amber-bg)',c:'var(--amber)',l:'Pending VP Approval'},
    pending_it:{bg:'var(--blue-bg)',c:'var(--blue)',l:'Pending Implementation'},
    cr_approved:{bg:'var(--green-bg)',c:'var(--green)',l:'Approved'},
    cr_rejected:{bg:'var(--red-bg)',c:'var(--red)',l:'Rejected'},
    implemented:{bg:'var(--green-bg)',c:'var(--green)',l:'Implemented'},
  };
  const s=M[status]||{bg:'var(--gray-bg)',c:'var(--gray)',l:status};
  return e('span',{style:{background:s.bg,color:s.c,fontSize:11,padding:'2px 8px',borderRadius:4,fontWeight:500,whiteSpace:'nowrap'}},s.l);
}

function StepDot({st}){
  const M={done:{bg:'var(--green-bg)',c:'var(--green)',sym:'✓'},pending:{bg:'var(--blue-bg)',c:'var(--blue)',sym:'●'},rejected:{bg:'var(--red-bg)',c:'var(--red)',sym:'✕'},waiting:{bg:'var(--gray-bg)',c:'var(--text3)',sym:'○'}};
  const s=M[st]||M.waiting;
  return e('span',{style:{display:'inline-flex',alignItems:'center',justifyContent:'center',width:18,height:18,borderRadius:'50%',background:s.bg,color:s.c,fontSize:9,fontWeight:600,flexShrink:0}},s.sym);
}

function Chain({chain}){
  return e('div',{style:{display:'flex',flexDirection:'column',gap:7}},
    chain.map((s,i)=>e('div',{key:i,style:{display:'flex',alignItems:'flex-start',gap:9}},
      e(StepDot,{st:s.st}),
      e('div',{style:{flex:1,paddingTop:1}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:8}},
          e('span',{style:{fontSize:12,fontWeight:s.st==='pending'?500:400,color:s.st==='waiting'?'var(--text3)':'var(--text)'}},[s.role,' — ',s.action]),
          s.date&&e('span',{style:{fontSize:11,color:'var(--text3)',flexShrink:0}},s.date)
        ),
        s.st==='done'&&s.user&&e('span',{style:{fontSize:11,color:'var(--text2)'}},s.user),
        s.remarks&&e('p',{style:{fontSize:11,color:'var(--red)',marginTop:3,lineHeight:1.4,fontStyle:'italic'}},'"',s.remarks,'"')
      )
    ))
  );
}

function SectionDivider({label}){
  return e('div',{style:{borderBottom:'0.5px solid var(--border)',paddingBottom:7,marginBottom:4,marginTop:22}},
    e('span',{style:{fontSize:10,fontWeight:500,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'0.08em'}},label)
  );
}

function Alert({type,children}){
  const M={info:{bg:'var(--blue-bg)',c:'var(--blue)',bd:'var(--blue-bd)'},warn:{bg:'var(--amber-bg)',c:'var(--amber)',bd:'var(--amber-bd)'},danger:{bg:'var(--red-bg)',c:'var(--red)',bd:'var(--red-bd)'}};
  const s=M[type]||M.info;
  return e('div',{style:{background:s.bg,border:`0.5px solid ${s.bd}`,borderRadius:'var(--r)',padding:'10px 14px',marginBottom:14}},
    e('p',{style:{fontSize:12,color:s.c,margin:0,lineHeight:1.6}},children)
  );
}

function ThemeToggle({theme,onToggle}){
  return e('button',{onClick:onToggle,style:{fontSize:11,padding:'5px 10px',background:'var(--bg2)',border:'0.5px solid var(--border)',fontWeight:500,whiteSpace:'nowrap'}},theme==='dark'?'Light Mode':'Dark Mode');
}

// ─── REQUEST CARD ────────────────────────────────────────────
function RequestCard({r,actionLabel,actionStyle,rejectLabel,showChain,onAction,noAction}){
  const [open,setOpen]=useState(false);
  const [remarks,setRemarks]=useState('');
  return e('div',{style:{border:'0.5px solid var(--border)',borderRadius:'var(--rl)',background:'var(--bg)',overflow:'hidden',marginBottom:10}},
    e('div',{style:{padding:'14px 18px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12},onClick:()=>setOpen(!open)},
      e('div',{style:{flex:1,minWidth:0}},
        e('div',{style:{display:'flex',alignItems:'center',gap:7,marginBottom:5,flexWrap:'wrap'}},
          e('span',{style:{fontFamily:'monospace',fontSize:11,color:'var(--text2)',whiteSpace:'nowrap'}},r.id),
          e(Badge,{status:r.status}),
          r.isLate&&e('span',{style:{background:'var(--amber-bg)',color:'var(--amber)',fontSize:10,padding:'1px 6px',borderRadius:3,fontWeight:500}},'LATE FILING'),
          r.jl&&e('span',{style:{background:'var(--gray-bg)',color:'var(--gray)',fontSize:10,padding:'1px 6px',borderRadius:3}},'JL attached')
        ),
        e('p',{style:{fontSize:14,fontWeight:500,margin:'0 0 3px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},r.title),
        e('p',{style:{fontSize:11,color:'var(--text2)',margin:0}},r.farm,' · Needed ',r.needed,' · ',r.isLate?r.days+'d (late)':r.days+'d ahead',' · By ',r.by)
      ),
      e('span',{style:{fontSize:10,color:'var(--text3)',flexShrink:0,marginTop:3}},open?'▲':'▼')
    ),
    open&&e('div',{style:{borderTop:'0.5px solid var(--border)',padding:'16px 18px'}},
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 20px',fontSize:12,marginBottom:14,color:'var(--text2)'}},
        e('div',null,e('span',{style:{marginRight:4}},'Type:'),e('span',{style:{color:'var(--text)'}},r.type)),
        e('div',null,e('span',{style:{marginRight:4}},'Purpose:'),e('span',{style:{color:'var(--text)'}},r.purpose)),
        r.chickin&&e('div',null,e('span',{style:{marginRight:4}},'Chick-in:'),e('span',{style:{color:'var(--text)'}},r.chickin)),
        r.cap&&r.cap!=='N/A'&&e('div',null,e('span',{style:{marginRight:4}},'Capacity:'),e('span',{style:{color:'var(--text)'}},r.cap)),
        r.mtgDate&&e('div',{style:{gridColumn:'1/-1'}},e('span',{style:{marginRight:4}},'Meeting:'),e('span',{style:{color:'var(--text)'}},r.mtgDate,' at ',r.mtgTime))
      ),
      e('p',{style:{fontSize:12,lineHeight:1.7,color:'var(--text)',marginBottom:14,borderLeft:'2px solid var(--border)',paddingLeft:12}},r.desc),
      showChain&&e('div',{style:{marginBottom:14}},
        e('p',{style:{fontSize:10,color:'var(--text2)',marginBottom:8,fontWeight:500,textTransform:'uppercase',letterSpacing:'0.07em'}},'Approval Chain'),
        e(Chain,{chain:r.chain})
      ),
      r.isLate&&e(Alert,{type:'warn'},'Late filing: only ',r.days,' days before project start. Verify the attached Justification Letter before acting.'),
      !noAction&&actionLabel&&e('div',null,
        e('label',{style:{marginBottom:5}},'Remarks (optional)'),
        e('textarea',{rows:2,placeholder:'Add remarks or conditions...',value:remarks,onChange:ev=>setRemarks(ev.target.value),style:{marginBottom:10}}),
        e('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
          e('button',{style:actionStyle||{},onClick:()=>onAction&&onAction('approve',r.id,remarks)},actionLabel),
          rejectLabel&&e('button',{style:{background:'var(--red-bg)',color:'var(--red)',border:'0.5px solid var(--red-bd)',padding:'7px 16px',fontWeight:500},onClick:()=>onAction&&onAction('reject',r.id,remarks)},rejectLabel),
          e('button',{style:{fontSize:12,padding:'7px 14px'},onClick:()=>onAction&&onAction('return',r.id,remarks)},'Return for Revision')
        )
      )
    )

// ─── APP ─────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [screen,setScreen]=useState('');
  const [loginId,setLoginId]=useState('jose');
  const [requests,setRequests]=useState(SEED);
  const [logs,setLogs]=useState(SEED_LOGS);
  const [changeRequests,setChangeRequests]=useState(SEED_CR);
  const [settings,setSettings]=useState(DEFAULT_SETTINGS);
  const [theme,setTheme]=useState('light');

  useEffect(()=>{document.body.setAttribute('data-theme',theme);},[theme]);
  const toggleTheme=()=>setTheme(t=>t==='dark'?'light':'dark');

  const login=()=>{
    const acc=ACCOUNTS.find(a=>a.id===loginId);
    if(!acc)return;
    setUser(acc);
    setScreen(NAV[acc.role][0].id);
  };

  const addRequest=newReq=>{
    setRequests(p=>[newReq,...p]);
    setLogs(p=>[{ts:'2026-03-23 '+new Date().toTimeString().slice(0,5),user:user.name,role:ROLE_LABELS[user.role],action:'Submitted',id:newReq.id,note:newReq.isLate?`Late filing – ${newReq.days} days ahead`:`${newReq.days} days ahead – standard`},...p]);
  };

  const addCr=cr=>{
    setChangeRequests(p=>[cr,...p]);
    setLogs(p=>[{ts:'2026-03-23 '+new Date().toTimeString().slice(0,5),user:user.name,role:ROLE_LABELS[user.role],action:'Submitted',id:cr.id,note:'Settings change request: '+cr.setting},...p]);
  };

  const crAction=(action,id,remarks)=>{
    setChangeRequests(p=>p.map(cr=>cr.id===id?{...cr,status:action==='approve'?'pending_it':'cr_rejected',approvedBy:action==='approve'?user.name:null}:cr));
    setLogs(p=>[{ts:'2026-03-23 '+new Date().toTimeString().slice(0,5),user:user.name,role:ROLE_LABELS[user.role],action:action==='approve'?'Approved':'Rejected',id,note:'Settings change request — '+remarks},...p]);
  };

  const implementCr=id=>{
    const cr=changeRequests.find(c=>c.id===id);
    setChangeRequests(p=>p.map(c=>c.id===id?{...c,status:'implemented',implementedBy:user.name}:c));
    setSettings(p=>p.map(s=>s.key===cr.key?{...s,value:cr.newVal.replace(/[₱, ]/g,'').split(' ')[0]}:s));
    setLogs(p=>[{ts:'2026-03-23 '+new Date().toTimeString().slice(0,5),user:user.name,role:ROLE_LABELS[user.role],action:'Implemented',id,note:'Setting updated: '+cr.setting+' → '+cr.newVal},...p]);
  };

  if(!user) return e('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg3)',padding:24,position:'relative'}},
    e('div',{style:{position:'absolute',top:18,right:18}},e(ThemeToggle,{theme,onToggle:toggleTheme})),
    e('div',{style:{background:'var(--bg)',border:'0.5px solid var(--border2)',borderRadius:'var(--rl)',padding:'44px 48px',width:380,maxWidth:'100%'}},
      e('div',{style:{textAlign:'center',marginBottom:32}},
        e('div',{style:{fontSize:10,letterSpacing:'0.14em',color:'var(--text2)',marginBottom:8,textTransform:'uppercase'}},'Brookside Group of Companies'),
        e('div',{style:{fontSize:46,fontWeight:700,letterSpacing:'-0.04em',marginBottom:5}},'EngiStart'),
        e('div',{style:{fontSize:11,color:'var(--text2)',lineHeight:1.5}},'Automated Project Initialization System')
      ),
      e('div',{style:{display:'grid',gap:13}},
        e('div',null,e('label',null,'Email address'),e('input',{type:'email',placeholder:'yourname@brooksidegroup.org',defaultValue:'j.santos@brooksidegroup.org'})),
        e('div',null,e('label',null,'Password'),e('input',{type:'password',defaultValue:'1234'})),
        e('div',{style:{borderTop:'0.5px solid var(--border)',paddingTop:13}},
          e('label',null,'Demo — select account'),
          e('select',{value:loginId,onChange:ev=>setLoginId(ev.target.value)},
            ACCOUNTS.map(a=>e('option',{key:a.id,value:a.id},ROLE_LABELS[a.role]+' — '+a.name))
          )
        ),
        e('button',{onClick:login,style:{background:'var(--blue-bg)',color:'var(--blue)',border:'0.5px solid var(--blue-bd)',padding:'10px',fontSize:13,fontWeight:500,marginTop:2}},'Sign In')
      )
    )
  );

  const nav=NAV[user.role];
  const badgeCounts={
    inbox: user.role==='division_head'?requests.filter(r=>r.status==='submitted').length:user.role==='vp'?requests.filter(r=>r.status==='recommended').length:user.role==='ed_manager'?requests.filter(r=>r.status==='noted').length:0,
    late: requests.filter(r=>r.status==='late_pending').length,
    noting: requests.filter(r=>r.status==='vp_approved').length,
    cr_inbox: changeRequests.filter(cr=>cr.status==='pending_vp').length,
    cr_implement: changeRequests.filter(cr=>cr.status==='pending_it').length,
  };

  const renderScreen=()=>{
    if(user.role==='farm_manager'){
      if(screen==='new_request') return e(NewRequestScreen,{user,onSubmit:addRequest});
      if(screen==='my_requests') return e(MyRequestsScreen,{userId:user.id,requests});
    }
    if(user.role==='division_head'){
      if(screen==='inbox') return e(InboxScreen,{items:requests.filter(r=>r.status==='submitted'),actionLabel:'Recommend for Approval',actionStyle:{background:'var(--green-bg)',color:'var(--green)',border:'0.5px solid var(--green-bd)',padding:'7px 18px',fontWeight:500},rejectLabel:'Reject',alertMsg:badgeCounts.inbox+' request'+(badgeCounts.inbox!==1?'s':'')+' pending your recommendation.',emptyMsg:'No requests pending recommendation.',showChain:true});
      if(screen==='history') return e(HistoryScreen,{items:requests.filter(r=>!['submitted'].includes(r.status))});
    }
    if(user.role==='vp'){
      if(screen==='inbox') return e(InboxScreen,{items:requests.filter(r=>r.status==='recommended'),actionLabel:'Approve',actionStyle:{background:'var(--green-bg)',color:'var(--green)',border:'0.5px solid var(--green-bd)',padding:'7px 18px',fontWeight:500},rejectLabel:'Reject',alertMsg:badgeCounts.inbox+' request'+(badgeCounts.inbox!==1?'s':'')+' pending your approval.',emptyMsg:'No requests pending approval.',showChain:true});
      if(screen==='cr_inbox') return e(CrInboxScreen,{changeRequests,onCrAction:crAction});
      if(screen==='history') return e(HistoryScreen,{items:requests.filter(r=>!['submitted','recommended'].includes(r.status))});
    }
    if(user.role==='dh_gs'){
      if(screen==='late') return e(InboxScreen,{items:requests.filter(r=>r.status==='late_pending'),actionLabel:'Approve Late Request',actionStyle:{background:'var(--amber-bg)',color:'var(--amber)',border:'0.5px solid var(--amber-bd)',padding:'7px 18px',fontWeight:500},rejectLabel:'Reject',alertMsg:badgeCounts.late+' late filing'+(badgeCounts.late!==1?'s':'')+' pending your validation.',emptyMsg:'No late filings pending.',showChain:false});
      if(screen==='noting') return e(InboxScreen,{items:requests.filter(r=>r.status==='vp_approved'),actionLabel:'Note & Forward to ED Manager',actionStyle:{background:'var(--blue-bg)',color:'var(--blue)',border:'0.5px solid var(--blue-bd)',padding:'7px 18px',fontWeight:500},alertMsg:badgeCounts.noting+' request'+(badgeCounts.noting!==1?'s':'')+' pending your notation.',emptyMsg:'No requests pending notation.',showChain:true});
      if(screen==='history') return e(HistoryScreen,{items:requests.filter(r=>['accepted','noted','rejected'].includes(r.status))});
      if(screen==='change_request') return e(ChangeRequestScreen,{user,onSubmit:addCr});
    }
    if(user.role==='ed_manager'){
      if(screen==='inbox') return e(InboxScreen,{items:requests.filter(r=>r.status==='noted'),actionLabel:'Accept',actionStyle:{background:'var(--green-bg)',color:'var(--green)',border:'0.5px solid var(--green-bd)',padding:'7px 18px',fontWeight:500},rejectLabel:'Return',alertMsg:badgeCounts.inbox+' request'+(badgeCounts.inbox!==1?'s':'')+' awaiting your final acceptance.',emptyMsg:'No requests pending acceptance.',showChain:true});
      if(screen==='history') return e(HistoryScreen,{items:requests.filter(r=>r.status==='accepted')});
      if(screen==='change_request') return e(ChangeRequestScreen,{user,onSubmit:addCr});
    }
    if(user.role==='it_admin'){
      if(screen==='all_requests') return e(AllRequestsScreen,{requests});
      if(screen==='users') return e(UsersScreen);
      if(screen==='audit') return e(AuditScreen,{logs});
      if(screen==='override') return e(OverrideScreen,{requests});
      if(screen==='cr_implement') return e(CrImplementScreen,{changeRequests,settings,onImplement:implementCr});
      if(screen==='settings') return e(SettingsScreen,{settings});
    }
    return e('div',{style:{padding:24,color:'var(--text2)',fontSize:13}},'Screen not found.');
  };

  const currentNav=nav.find(n=>n.id===screen);
  const totalPending=(badgeCounts.inbox||0)+(badgeCounts.late||0)+(badgeCounts.noting||0)+(badgeCounts.cr_inbox||0)+(badgeCounts.cr_implement||0);

  return e('div',{style:{display:'flex',height:'100vh',overflow:'hidden'}},
    e('div',{style:{width:'var(--sidebar)',background:'var(--bg2)',borderRight:'0.5px solid var(--border)',display:'flex',flexDirection:'column',flexShrink:0}},
      e('div',{style:{padding:'18px 16px',borderBottom:'0.5px solid var(--border)'}},
        e('div',{style:{fontSize:20,fontWeight:700,letterSpacing:'-0.03em'}},'EngiStart'),
        e('div',{style:{fontSize:10,color:'var(--text2)',marginTop:3,lineHeight:1.4}})
      ),
      e('nav',{style:{flex:1,padding:'10px 8px',overflowY:'auto'}},
        nav.map(n=>{
          const bc=n.id==='cr_inbox'?badgeCounts.cr_inbox:n.id==='cr_implement'?badgeCounts.cr_implement:badgeCounts[n.id]||0;
          return e('button',{key:n.id,onClick:()=>setScreen(n.id),style:{
            display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',
            padding:'8px 10px',borderRadius:6,textAlign:'left',cursor:'pointer',marginBottom:2,
            fontSize:13,fontWeight:screen===n.id?500:400,
            background:screen===n.id?'var(--bg)':'transparent',
            border:screen===n.id?'0.5px solid var(--border)':'0.5px solid transparent',
            color:screen===n.id?'var(--text)':'var(--text2)',
          }},
            e('span',null,n.label),
            n.badge&&bc>0&&e('span',{style:{background:'var(--amber-bg)',color:'var(--amber)',fontSize:10,padding:'1px 6px',borderRadius:99,fontWeight:600}},bc)
          );
        })
      ),
      e('div',{style:{padding:12,borderTop:'0.5px solid var(--border)'}},
        e('div',{style:{fontSize:10,color:'var(--text3)',marginBottom:3}},'Signed in as'),
        e('div',{style:{fontSize:12,fontWeight:500,marginBottom:1}},user.name),
        e('div',{style:{fontSize:11,color:'var(--blue)',marginBottom:10}},ROLE_LABELS[user.role]),
        e('div',{style:{fontSize:10,color:'var(--text3)',marginBottom:4}},'Switch account (demo)'),
        e('select',{value:user.id,onChange:ev=>{const a=ACCOUNTS.find(x=>x.id===ev.target.value);setUser(a);setScreen(NAV[a.role][0].id);},style:{fontSize:11,marginBottom:8}},
          ACCOUNTS.map(a=>e('option',{key:a.id,value:a.id},ROLE_LABELS[a.role]+' — '+a.name))
        ),
        e('button',{onClick:()=>setUser(null),style:{fontSize:11,width:'100%',color:'var(--text2)'}},'Sign Out')
      )
    ),
    e('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
      e('div',{style:{padding:'13px 22px',borderBottom:'0.5px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0,background:'var(--bg)'}},
        e('span',{style:{fontSize:14,fontWeight:500}},currentNav?.label||''),
        e('div',{style:{display:'flex',gap:10,alignItems:'center'}},
          e(ThemeToggle,{theme,onToggle:toggleTheme}),
          e('span',{style:{fontSize:11,color:'var(--text2)'}},'March 23, 2026'),
          e('span',{style:{background:'var(--blue-bg)',color:'var(--blue)',fontSize:11,padding:'2px 10px',borderRadius:4}},ROLE_LABELS[user.role]),
          totalPending>0&&e('span',{style:{background:'var(--amber-bg)',color:'var(--amber)',fontSize:11,padding:'2px 8px',borderRadius:4,fontWeight:500}},'● '+totalPending+' pending')
        )
      ),
      e('div',{style:{flex:1,overflowY:'auto',background:'var(--bg)'}},renderScreen())
    )
  );
}

ReactDOM.render(e(App), document.getElementById('root'));
</script>
</body>
</html>
