<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Footer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styling-hf.css">

<body>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">

      <div class="ticker-text">
        <em>Tournament:</em> <span id="footer-tournament">Mobile Legends Open</span>
        &nbsp;•&nbsp;
        <span id="footer-extra">PLAY - IN</span>
        &nbsp;•&nbsp;
        Next match details coming soon
        &nbsp;•&nbsp;
      </div>
    </div>
    <div class="bottom-divider"></div>
    <div class="bottom-logo"><em>Sportfest</em> 2026</div>
  </div>

  <!-- ✅ Syncs tournament name and footer extra from control.html -->
  <script src="./overlay-sync-hf.js"></script>

</body>
</html>
